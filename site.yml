---

- hosts: all
  become: yes

  pre_tasks:

    - name: install updates (rocky)
      tags: always 
      ansible.builtin.dnf:
        update_cache: yes
      changed_when: false
      when: ansible_distribution == "Rocky"

    - name: install updates (ubuntu)
      tags: always
      ansible.builtin.apt:
        upgrade: yes
        update_cache: yes
      changed_when: false 
      when: ansible_distribution == "Ubuntui"

- hosts: all
  become: yes
  tasks:
    - name: add ssh key
      tags: always
      ansible.posix.authorized_key:
        user: simone
        key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAII1lycjr7QEMbPBgK3QspKyl0CBTOsz3Y7Fj46eoxU6a shashi key"



- hosts: workstation
  become: yes

  tasks:      
    - name: install unzip 
      package: 
        name: unzip 

    - name: install terraform 
      unarchive:
        src: https://releases.hashicorp.com/terraform/1.15.7/terraform_1.15.7_linux_amd64.zip
        dest: /usr/local/bin 
        remote_src: yes 
        mode: 0755
        owner: root
        group : root
        creates: /usr/local/bin/terraform

- hosts: webserver
  become: yes

  tasks:

    - name: Install web packages on Debian family
      tags: apache,apache2,ubuntu 
      ansible.builtin.apt: 
        name : 
          - apache2
          - libapache2-mod-php
        state: latest
        update_cache: yes
      when: ansible_distribution == "Ubuntu"

    - name: Install web packages on Redhat Family 
      tags: apache,rocky,httpd 
      ansible.builtin.dnf:
        name :
          - httpd
          - php
        state: latest
        update_cache: yes
      when: ansible_distribution == "Rocky"

    - name: chamge email address for admin 
      tags: apche, rocky,httpd
      lineinfile: 
        path: /etc/httpd/conf/httpd.conf 
        regexp: '^ServerAdmin'
        line: ServerAdmin somebody@somewhere.net
      when: ansible_distribution == "Rocky"
      register: httpd

    - name : restart httpd 
      tags: apache,rocky,httpd
      ansible.builtin.service:
        name: httpd 
        state: restarted 
      when: httpd.changed 

    - name: copy default html for site 
      tags: apache,apache2,httpd  
      copy:
        src: default_site.html 
        dest: /var/www/html/index.html 
        owner: root
        group: root
        mode: 0644
    
    - name: start httpd
      tags: apache,rocky,httpd 
      ansible.builtin.service: 
        name : httpd
        state : started 
        enabled : yes
      when: ansible_distribution == "Rocky"  

- hosts: db_server 
  become: yes

  tasks: 

    - name: Update apt cache and upgrade packages
      tags: always
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
      when: ansible_distribution == "Ubuntu"

    - name: Install MariaDB package (Ubuntu)
      tags: db,mariadb,ubuntu
      ansible.builtin.apt:
        name: mariadb-server
        state: latest
      when: ansible_distribution == "Ubuntu"

- hosts: file_server 
  become: yes 
  
  tasks: 

   - name : install samba package 
     ansible.builtin.dnf:
       name: samba 
       state : latest 

