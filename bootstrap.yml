---

- hosts: all
  become: yes

  pre_tasks:

    - name: install updates (rocky)
      tags: always 
      ansible.builtin.dnf:
        update_only: yes
        update_cache: yes
      when: ansible_distribution == "Rocky"

    - name: install updates (ubuntu)
      tags: always
      ansible.builtin.apt:
        upgrade: yes
        update_cache: yes
      when: ansible_distribution == "Ubuntui"

- hosts: all
  become: yes
  
  tasks: 
    - name : create user simone  
      tags : always 
      user : 
       name : simone  
       groups: root

    - name: add ssh key
      tags: always
      ansible.posix.authorized_key:
        user: simone
        key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAII1lycjr7QEMbPBgK3QspKyl0CBTOsz3Y7Fj46eoxU6a shashi key"
    - name : add sudoers file to  simone  
      tags: always  
      copy:
        src: sudoer_simone 
        dest: /etc/sudoers.d/simone 
        owner: root 
        group : root 
        mode: 0440 


