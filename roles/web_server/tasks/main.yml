- name: Install web packages on uubuntu and rocky 
  tags: apache,apache2,ubuntu
  package:  
    name :
      - "{{ apache_package_name }}"
      - "{{ php_package_name }}"
    state: latest

- name : start and enable apache service for ubuntu and rocky  
  tags: apache,httpd
  ansible.builtin.service:
    name:  "{{ apache_service }}"
    state: started 
    enabled: yes 

- name: chamge email address for admin
  tags: apache, rocky,httpd
  lineinfile:
    path: /etc/httpd/conf/httpd.conf
    regexp: '^ServerAdmin'
    line: ServerAdmin somebody@somewhere.com
  when: ansible_distribution == "Rocky"
  notify: restart_apache 

- name: copy default html for site
  tags: apache,apache2,httpd
  copy:
    src: default_site.html
    dest: /var/www/html/index.html
    owner: root
    group: root
    mode: 0644


