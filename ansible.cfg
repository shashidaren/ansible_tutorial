[defaults] 
inventory = inventory
remote_user = simone 
# Run more hosts in parallel (default is 5)
forks = 20

# Skip the "Gathering Facts" step if you don't need facts
gathering = smart

# Cache facts so repeated runs don't re-gather every time
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_fact_cache
fact_caching_timeout = 86400

# Disable host key checking prompts (careful — see note below)
host_key_checking = False

# Reduce SSH connection setup overhead
[ssh_connection]
pipelining = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r

